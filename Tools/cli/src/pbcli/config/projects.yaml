frontend:
- name: web-post
  path: Frontend/web-post
  kind: frontend
  domain: post
  runtime: node
  framework: react-vite
  build: vite
  db: none
  port: 3000
  start_command: npm install; npm run dev -- --host 0.0.0.0 --port $env:VITE_APP_PORT
  test_command: npm install; npm run test
  env_file: .env.example
- name: web-shop
  path: Frontend/web-shop
  kind: frontend
  domain: shop
  runtime: node
  framework: react-vite
  build: vite
  db: none
  port: 3000
  start_command: npm install; npm run dev -- --host 0.0.0.0 --port $env:VITE_APP_PORT
  test_command: npm install; npm run test
  env_file: .env.example
database:
- name: db-postgresql
  path: Database/postgresql
  kind: database
  domain: shared
  runtime: docker
  framework: compose
  build: docker
  db: postgresql
  port: 0
  start_command: docker compose -f Database/docker/docker-compose.yml up -d
  test_command: docker compose -f Database/docker/docker-compose.yml ps
  env_file: Database/docker/.env
- name: db-mysql
  path: Database/mysql
  kind: database
  domain: shared
  runtime: docker
  framework: compose
  build: docker
  db: mysql
  port: 0
  start_command: docker compose -f Database/docker/docker-compose.yml up -d
  test_command: docker compose -f Database/docker/docker-compose.yml ps
  env_file: Database/docker/.env
- name: db-redis
  path: Database/docker
  kind: database
  domain: shared
  runtime: docker
  framework: compose
  build: docker
  db: redis
  port: 0
  start_command: docker compose -f Database/docker/docker-compose.yml up -d
  test_command: docker compose -f Database/docker/docker-compose.yml ps
  env_file: Database/docker/.env
- name: db-elasticsearch
  path: Database/docker
  kind: database
  domain: shared
  runtime: docker
  framework: compose
  build: docker
  db: elasticsearch
  port: 0
  start_command: docker compose -f Database/docker/docker-compose.yml up -d
  test_command: docker compose -f Database/docker/docker-compose.yml ps
  env_file: Database/docker/.env
