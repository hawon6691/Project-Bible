name: shop-typescript-nestjs-npm-postgresql CI

on:
  pull_request:
    paths:
      - ".github/workflows/shop-typescript-nestjs-npm-postgresql-ci.yml"
      - "Backend/shop/shop-typescript-nestjs-npm-postgresql/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/shop-typescript-nestjs-npm-postgresql-ci.yml"
      - "Backend/shop/shop-typescript-nestjs-npm-postgresql/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: Backend/shop/shop-typescript-nestjs-npm-postgresql

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Backend/shop/shop-typescript-nestjs-npm-postgresql/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e
