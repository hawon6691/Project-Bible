name: post-java-springboot-maven-mysql CI

on:
  pull_request:
    paths:
      - ".github/workflows/post-java-springboot-maven-mysql-ci.yml"
      - "Backend/post/post-java-springboot-maven-mysql/**"
      - "Database/mysql/post/**"
      - "Tools/ci/load_mysql.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/post-java-springboot-maven-mysql-ci.yml"
      - "Backend/post/post-java-springboot-maven-mysql/**"
      - "Database/mysql/post/**"
      - "Tools/ci/load_mysql.sh"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: Backend/post/post-java-springboot-maven-mysql

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: 1234
          MYSQL_DATABASE: mysql
          MYSQL_USER: admin
          MYSQL_PASSWORD: 1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: admin
      MYSQL_PASSWORD: 1234
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: pb_post
      DB_USER: admin
      DB_PASSWORD: 1234
      JWT_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y default-mysql-client
        working-directory: .
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: chmod +x Tools/ci/load_mysql.sh
        working-directory: .
      - run: bash Tools/ci/load_mysql.sh post pb_post
        working-directory: .
      - run: chmod +x mvnw
      - run: ./mvnw -B test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-java-springboot-maven-mysql-test-reports
          path: Backend/post/post-java-springboot-maven-mysql/target/surefire-reports/
          if-no-files-found: ignore
