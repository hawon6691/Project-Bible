server:
  port: ${SERVER_PORT:${APP_PORT:8000}}

spring:
  application:
    name: ${APP_NAME:post-java-springboot-maven-postgresql}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pb_post}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:1234}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs
